# version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: autocorrect_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: autocorrect
      MYSQL_USER: autocorrect_user
      MYSQL_PASSWORD: autocorrect_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: autocorrect_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: autocorrect_backend
    command: >
      bash -c "python manage.py migrate && 
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: autocorrect_celery_worker
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autocorrect_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

volumes:
  db_data:
